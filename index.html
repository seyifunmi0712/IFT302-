<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IFT 302 Course Notes</title>
<meta name="description" content="Course notes and PDFs for IFT 302 and CSC 322." />
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 .5rem; font-size: 2.25rem; }
  header p { margin: 0; color: var(--muted); }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  h2 { margin-top: 2.5rem; font-size: 1.25rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .grid { display: grid; gap: 1rem; grid-template-columns: 1fr; }
  @media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: transform .15s, border-color .15s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card h3 { margin: 0 0 .25rem; font-size: 1.1rem; }
  .card .course { color: var(--accent); font-size: .85rem; font-weight: 600; margin-bottom: .75rem; }
  .card p { color: var(--muted); font-size: .9rem; margin: 0 0 1rem; }
  .actions { display: flex; gap: .5rem; flex-wrap: wrap; }
  .btn {
    display: inline-block;
    padding: .5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: .875rem;
    font-weight: 500;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  footer { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: .85rem; border-top: 1px solid var(--border); }
  footer a { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>IFT 302 Course Notes</h1>
    <p>Lecture notes &amp; reference PDFs</p>
  </header>
  <main>
    <h2>Available Notes</h2>
    <div class="grid">
      <article class="card">
        <div class="course">IFT 302</div>
        <h3>IFT 302 Notes</h3>
        <p>Full lecture notes for the IFT 302 course.</p>
        <div class="actions">
          <a class="btn btn-primary" href="IFT_302_Notes.pdf" target="_blank" rel="noopener">View PDF</a>
          <a class="btn btn-secondary" href="IFT_302_Notes.pdf" download>Download</a>
        </div>
      </article>
      <article class="card">
        <div class="course">CSC 322</div>
        <h3>CSC 322 Notes</h3>
        <p>Reference notes for the CSC 322 course.</p>
        <div class="actions">
          <a class="btn btn-primary" href="CSC_322_Notes.pdf" target="_blank" rel="noopener">View PDF</a>
          <a class="btn btn-secondary" href="CSC_322_Notes.pdf" download>Download</a>
        </div>
      </article>
    </div>
  </main>
  <footer>
    <p>Hosted on <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a></p>
  </footer>
</body>
</html>
